<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>我的分類收藏</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>

<body>
    <div id="login-section" class="container">
        <h2 id="form-title" style="text-align: center; margin-bottom: 20px;">🔒 私人連結收藏庫</h2>
        <div class="login-form">
            <input type="text" id="username-input" placeholder="請輸入帳號" required>
            <input type="password" id="password-input" placeholder="請輸入密碼" required>

            <input type="password" id="invite-code-input" placeholder="請輸入通關密語 (註冊必填)" style="display: none;">

            <button id="submit-btn" onclick="handleSubmit()">登入</button>
            <p id="login-message" style="color: red; margin-top: 10px; font-size: 14px; text-align: center;"></p>

            <div class="toggle-mode-container"
                style="margin-top: 25px; text-align: center; font-size: 15px; color: #666;">
                <span id="mode-text">還沒有帳號嗎？</span>
                <a href="#" onclick="toggleAuthMode(); return false;" id="mode-link"
                    style="color: #4CAF50; text-decoration: none; font-weight: bold; padding: 10px;">點此註冊</a>
            </div>
        </div>
    </div>

    <div id="main-app-section" style="display: none;">
        <div class="app-header">
            <span>歡迎，<span id="user-display-name" style="font-weight: bold;"></span></span>

            <div class="header-actions">
                <button onclick="openAddModal()" class="header-btn primary-btn">新增</button>
                <button onclick="handleLogout()" class="header-btn danger-btn">登出</button>
                <button onclick="openCategoryModal()" class="header-btn"
                    style="color: #1c1c1e; border: 1px solid #1c1c1e;">管理分類</button>
            </div>
        </div>
    </div>

    <div id="app-content"></div>

    <div id="add-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>新增收藏</h3>
                <button onclick="closeAddModal()" class="close-btn">✖</button>
            </div>
            <form id="add-link-form" class="add-form" onsubmit="submitNewLink(event)">
                <input type="text" id="new-title" placeholder="標題 (例如：超讚的穿搭筆記)" required>
                <input type="url" id="new-url" placeholder="網址" required>

                <select id="new-source" required>
                    <option value="" disabled selected>請選擇來源平台</option>
                    <option value="Threads">Threads</option>
                    <option value="Instagram">Instagram</option>
                    <option value="Facebook">Facebook</option>
                    <option value="其他">其他</option>
                </select>

                <select id="new-subcategory" required>
                    <option value="" disabled selected>載入中...</option>
                </select>

                <button type="submit" class="submit-btn">儲存連結</button>
            </form>
        </div>
    </div>

    <div id="category-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="max-height: 85vh; overflow-y: auto; width: 95%; max-width: 500px;">
            <div class="modal-header"
                style="position: sticky; top: 0; background: white; padding-bottom: 10px; border-bottom: 1px solid #eee; z-index: 10;">
                <h3 style="margin: 0;">分類管理</h3>
                <button onclick="closeCategoryModal()" class="close-btn">✖</button>
            </div>

            <div style="display: flex; gap: 10px; margin: 20px 0;">
                <input type="text" id="new-category-input" placeholder="輸入新分類名稱..."
                    style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px;">
                <button onclick="submitNewCategory()" class="header-btn primary-btn"
                    style="background: #007AFF; color: white;">新增</button>
            </div>

            <div id="category-edit-list">
                <p style="text-align: center; color: #8e8e93;">載入中...</p>
            </div>
        </div>
    </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
