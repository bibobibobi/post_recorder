<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>我的分類收藏</title>
    <link rel="stylesheet" href="style.css?v={{ get_version('style.css') }}">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>

<body>
    <div id="login-section" class="container">
        <h2 id="form-title" style="text-align: center; margin-bottom: 20px;">🔒 私人連結收藏庫</h2>
        <div class="login-form">
            <input type="text" id="username-input" placeholder="請輸入帳號" required>
            <input type="password" id="password-input" placeholder="請輸入密碼" required>

            <input type="password" id="invite-code-input" placeholder="請輸入通關密語 (註冊必填)" style="display: none;">

            <button id="submit-btn" onclick="handleSubmit()">登入</button>
            <p id="login-message" style="color: red; margin-top: 10px; font-size: 14px; text-align: center;"></p>

            <div class="toggle-mode-container"
                style="margin-top: 25px; text-align: center; font-size: 15px; color: #666;">
                <span id="mode-text">還沒有帳號嗎？</span>
                <a href="#" onclick="toggleAuthMode(); return false;" id="mode-link"
                    style="color: #4CAF50; text-decoration: none; font-weight: bold; padding: 10px;">點此註冊</a>
            </div>
        </div>
    </div>

    <div id="main-app-section" style="display: none;">
        <div class="app-header">
            <span>歡迎，<span id="user-display-name" style="font-weight: bold;"></span></span>

            <div class="header-right-area" style="display: flex; align-items: center; gap: 16px;">

                <div id="group-workspace-panel" class="workspace-card" style="margin-right: 4px;">
                    <select id="group-select" onchange="switchGroup(this.value)" class="modern-select">
                    </select>
                </div>

                <button onclick="toggleSearchBar()" class="hamburger-btn"
                    style="display: flex; align-items: center; padding: 4px;">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1c1c1e" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>

                <button onclick="toggleSideMenu()" class="hamburger-btn"
                    style="display: flex; align-items: center; padding: 4px;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1c1c1e" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>

            </div>
        </div>

        <div id="search-bar-container"
            style="display: none; padding: 10px 20px; background-color: #ffffff; border-bottom: 1px solid #f2f2f7;">
            <input type="text" id="category-search-input" placeholder="輸入要搜尋的關鍵字 ..." oninput="handleCategorySearch()"
                style="width: 100%; padding: 10px 16px; background-color: #f2f2f7; border: none; border-radius: 10px; font-size: 15px; outline: none;">
        </div>

        <div id="side-menu" class="side-menu">
            <div class="side-menu-header">
                <h3>功能選單</h3>
                <button onclick="toggleSideMenu()" class="close-menu-btn">✕</button>
            </div>
            <div class="side-menu-content">
                <button onclick="openCategoryModal(); toggleSideMenu();" class="menu-item-btn"
                    style="display: flex; align-items: center; justify-content: flex-start; gap: 12px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <span style="transform: translateY(0px);">分類管理</span>
                </button>

                <button onclick="createNewGroup(); toggleSideMenu();" class="menu-item-btn"
                    style="display: flex; align-items: center; justify-content: flex-start; gap: 12px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <line x1="20" y1="8" x2="20" y2="14"></line>
                        <line x1="23" y1="11" x2="17" y2="11"></line>
                    </svg>
                    <span style="transform: translateY(0px);">建立群組</span>
                </button>

                <button id="btn-invite" onclick="generateInviteLink(); toggleSideMenu();"
                    class="menu-item-btn invite-btn"
                    style="display: none; align-items: center; justify-content: flex-start; gap: 12px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                    </svg>
                    <span style="transform: translateY(0px);">邀請連結</span>
                </button>

                <button onclick="toggleBatchMode(); toggleSideMenu();" class="menu-item-btn"
                    style="display: flex; align-items: center; justify-content: flex-start; gap: 12px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 11l3 3L22 4"></path>
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                    </svg>
                    <span style="transform: translateY(0px);">批量管理</span>
                </button>

                <hr style="border: 0; border-top: 1px solid #e5e5ea; margin: 15px 0;">

                <button onclick="handleLogout(); toggleSideMenu();" class="menu-item-btn logout-btn"
                    style="display: flex; align-items: center; justify-content: flex-start; gap: 12px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span style="transform: translateY(0px);">登出帳號</span>
                </button>
            </div>
        </div>

        <div id="menu-overlay" class="menu-overlay" onclick="toggleSideMenu()"></div>

        <button onclick="openAddModal()" class="floating-action-btn">＋</button>
    </div>

    <div id="app-content"></div>

    <div id="add-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>新增收藏</h3>
                <button onclick="closeAddModal()" class="close-btn">✖</button>
            </div>
            <div class="form-group"
                style="margin-bottom: 15px; background: #f2f2f7; padding: 10px; border-radius: 8px;">
                <label style="font-size: 13px; color: #8e8e93; display: block; margin-bottom: 4px;">準備儲存至：</label>
                <select id="modal-group-select" onchange="handleModalGroupChange()"
                    style="width: 100%; border: none; background: transparent; font-size: 16px; font-weight: bold; color: #1c1c1e; outline: none; cursor: pointer;">
                </select>
            </div>
            <form id="add-link-form" class="add-form" onsubmit="submitNewLink(event)">
                <div class="input-with-clear">
                    <input type="text" id="new-title" placeholder="標題" required oninput="toggleClearBtn()">
                    <button type="button" id="clear-title-btn" class="input-clear-btn"
                        onclick="clearTitleInput()">✖</button>
                </div>
                <input type="url" id="new-url" placeholder="網址" required>

                <select id="new-source" required>
                    <option value="" disabled selected>請選擇來源平台</option>
                    <option value="Threads">Threads</option>
                    <option value="Instagram">Instagram</option>
                    <option value="Facebook">Facebook</option>
                    <option value="其他">其他</option>
                </select>

                <select id="new-category-select" onchange="handleCategoryChange()" required>
                    <option value="" disabled selected>選擇大分類</option>
                </select>

                <select id="new-subcategory-select" onchange="handleSubcategoryChange()" style="display: none;"
                    required>
                    <option value="" disabled selected>小分類(請先選擇大分類)</option>
                </select>

                <!-- 🌟 快速推薦標籤區塊 (預設先隱藏，等選了分類再顯示) -->
                <div id="tags-section" style="margin: 12px 0; display: none;">
                    <label style="font-size: 13px; color: #8e8e93; display: block; margin-bottom: 8px;">推薦標籤
                        (可多選)：</label>

                    <!-- 標籤按鈕會由 JS 動態填入這裡 -->
                    <div id="tags-container" class="tags-chips-container"></div>
                </div>

                <button type="submit" class="submit-btn">儲存連結</button>
            </form>
        </div>
    </div>

    <div id="category-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="max-height: 85vh; overflow-y: auto; width: 95%; max-width: 500px;">
            <div class="modal-header"
                style="position: sticky; top: 0; background: white; padding-bottom: 10px; border-bottom: 1px solid #eee; z-index: 10;">
                <h3 style="margin: 0;">分類管理</h3>
                <button onclick="closeCategoryModal()" class="close-btn">✖</button>
            </div>

            <div style="display: flex; gap: 10px; margin: 20px 0;">
                <input type="text" id="new-category-input" placeholder="輸入新分類名稱..."
                    style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px;">
                <button onclick="submitNewCategory()" class="header-btn primary-btn"
                    style="background: #007AFF; color: white;">新增</button>
            </div>

            <div id="category-edit-list">
                <p style="text-align: center; color: #8e8e93;">載入中...</p>
            </div>
        </div>
    </div>
    </div>

    <div id="batch-toolbar">
        <span id="batch-count-text" style="font-size: 15px; font-weight: 500; color: #8e8e93;">已選取 0 項</span>
        <div style="display: flex; gap: 12px;">
            <button id="batch-move-btn" onclick="openBatchMoveModal()"
                style="background: #007AFF; color: white; border: none; padding: 8px 16px; border-radius: 20px; font-weight: 600; cursor: pointer; transition: 0.2s;">搬移</button>
            <button id="batch-delete-btn" onclick="executeBatchDelete()"
                style="background: #FF3B30; color: white; border: none; padding: 8px 16px; border-radius: 20px; font-weight: 600; cursor: pointer; transition: 0.2s;">刪除</button>
        </div>
    </div>

    <!-- 🌟 批量搬移專用視窗 -->
    <div id="batch-move-modal" class="modal-overlay" style="display: none; z-index: 10000;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>移動至...</h3>
                <button onclick="closeBatchMoveModal()" class="close-btn">✖</button>
            </div>
            <div style="margin: 20px 0; display: flex; flex-direction: column; gap: 15px;">
                <select id="batch-move-category" onchange="handleBatchMoveCategoryChange()"
                    style="width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 16px; outline: none; background: #f2f2f7; color: #1c1c1e;">
                    <option value="" disabled selected>選擇目標大分類</option>
                </select>

                <select id="batch-move-subcategory"
                    style="width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 16px; outline: none; display: none; background: #f2f2f7; color: #1c1c1e;">
                    <option value="" disabled selected>選擇目標小分類</option>
                </select>
            </div>
            <button onclick="executeBatchMove()"
                style="width: 100%; margin-top: 10px; padding: 14px; background-color: #007AFF; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer;">確認搬移</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="app.js?v={{ get_version('app.js') }}"></script>
</body>

</html>
